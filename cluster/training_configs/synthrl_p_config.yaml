# Full training config for SynthRL-p -- stage 1 of the SynthRL port (Shin & Lee, IJCAI-25;
# github.com/argaaw/SynthRL). Hyperparameters follow the repo's `config/stage1.yaml` and
# `config/model/SynthRL.yaml`. Stage 1 is parameter loss only: the Gaussian-smoothed
# per-parameter cross-entropy, no RL, no synthesizer in the loop. The checkpoint this run
# produces is what SynthRL-i warm-starts from:
#
#     sbatch -A "$SLURM_ACCOUNT" cluster/train.sbatch <corpus> SynthRLp synthrl_p
#
# The paper's 25-class discretization is the family default (num_bins), as is the smoothing
# width (sigma 0.5 class indices = the repo's GaussianKernelConv(sigma=0.02) at 25 classes);
# neither is a TrainingConfig knob, so neither appears below.
#
# Deviations from the paper, dictated by what models/training/ supports:
# - Scheduler: the repo uses CosineAnnealingWarmRestarts(T_0=50, eta_min=1e-6) plus a manual
#   10-epoch linear LR warmup from 0.2x. The harness supports plain cosine only, so this run
#   uses cosine decay over the full 200 epochs (same treatment as full_config.yaml).
# - Validation: a single seeded 10% split (framework convention), not the repo's 5-fold CV
#   with a 20% test holdout.
# - Network size: d_model 256 and 4+4 transformer layers are the family defaults, below the
#   repo's 512 and 6+6. Not settable from here -- see docs/SYNTHRL_PORT.md.
seed: 0

optimizer:
  name: adamw
  learning_rate: 2.0e-4     # repo stage1.yaml: optim.initial_lr
  weight_decay: 1.0e-4      # repo stage1.yaml: optim.weight_decay
  scheduler: cosine
  scheduler_max_epochs: 200 # matches trainer.max_epochs below

# No `loss:` block: SynthRL supplies its own class cross-entropy and ignores the injected
# ParameterLoss entirely (see models/synthrl/families.py).

data:
  batch_size: 32            # repo stage1.yaml: train.minibatch_size
  num_workers: 8            # matches #SBATCH --cpus-per-task=8
  pin_memory: true
  persistent_workers: true
  val_fraction: 0.1         # seeded sample-level split (repo: 5-fold CV; see header)

trainer:
  max_epochs: 200             # paper 4.2: "trained on the in-domain dataset for 400 epochs.
                              # Over the initial 200 epochs, only the parameter loss"
  precision: bf16-mixed       # A100
  accelerator: gpu            # fail loud if no GPU is visible (we requested --gres=gpu:1)
  devices: 1
  strategy: auto
  log_every_n_steps: 50

logger:
  wandb: true
