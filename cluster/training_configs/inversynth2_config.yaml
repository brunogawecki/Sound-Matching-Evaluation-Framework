# Full training config for the InverSynth II neural-proxy family (Barkan et al., ISMIR 2023;
# paper_repos/InverSynth2). Shared by all three stages -- `IS` (Stage 1), `IS2xITF` (Stage 2),
# and `IS2` (Stage 3): they use the same Section 3.2 hyperparameters, so one recipe serves all.
#   - `IS`: the parameters-loss-only encoder (no synthesizer-proxy, no ITF).
#   - `IS2xITF`: the `IS` encoder plus a training-only differentiable synthesizer-proxy, trained
#     on the combined loss parameters_loss + lambda * audio_loss (Eq. 4). ("x" = excluding ITF.)
#   - `IS2`: `IS2xITF` with per-sample inference-time finetuning (ITF, Eq. 6). ITF is inference-only,
#     so training is identical to `IS2xITF`; this same config trains it unchanged.
# `audio_loss_weight` below is the paper's lambda for `IS2xITF`; `IS` ignores it (its plain
# regressor never reads it), so the same file is correct for both.
#
# The paper's parameters loss is the equal average of cross-entropy (categorical params) and
# L2 (numerical params), so categorical_loss_weight is 1.0 here, not the harness default 0.2.
# The audio loss (IS2xITF only) is the MAE between the proxy's reconstructed spectrogram and the
# mel-dB input; the paper weights it with lambda = 1.
#
# Deviations from the paper, dictated by what models/training/ supports:
# - Adam betas: the paper uses (0.9, 0.99); OptimizerConfig exposes no betas knob, so this
#   run uses PyTorch's default (0.9, 0.999). Minor.
# - Scheduler: the paper schedules the LR from 1e-4 down to 1e-6 over the run. The harness
#   supports cosine only, so this uses cosine decay from 1e-4 over the 100 epochs as the
#   stand-in (same treatment as full_config.yaml / presetgen_full_config.yaml).
# - Validation: a single seeded 10% split (framework convention), not the paper's 5-fold CV.
#   Checkpoint selection is on val_loss, a documented deviation from the paper's real-synth
#   model selection (its Eq. 5) forced by the VST-free cluster (D-SELFDESC). What val_loss means
#   differs by model: for `IS` it is the parameter loss; for `IS2xITF` it is the combined loss
#   (parameters loss + lambda * proxy audio loss), the same objective minimized in training,
#   measured through the training-only proxy.
seed: 0

optimizer:
  name: adam                # paper: Adam, beta1 0.9 / beta2 0.99 (beta2 not settable here)
  learning_rate: 1.0e-4     # paper: LR scheduled 1e-4 -> 1e-6
  weight_decay: 0.0
  scheduler: cosine
  scheduler_max_epochs: 100 # matches trainer.max_epochs below

loss:
  continuous_loss: mse
  categorical_loss_weight: 1.0  # paper: equal average of CE (categorical) and L2 (numerical)
  audio_loss_weight: 1.0        # paper: proxy audio-loss lambda = 1 (Eq. 4); IS2xITF only, IS ignores it

data:
  batch_size: 64            # paper: batch size 64
  num_workers: 8            # matches #SBATCH --cpus-per-task=8
  pin_memory: true
  persistent_workers: true
  val_fraction: 0.1         # seeded sample-level split (paper: 5-fold CV; see header)

trainer:
  max_epochs: 100             # paper: 100 epochs
  precision: bf16-mixed       # A100
  accelerator: gpu            # fail loud if no GPU is visible (we requested --gres=gpu:1)
  devices: 1
  strategy: auto
  log_every_n_steps: 50

logger:
  wandb: true
