# Full training config for Sound2SynthSpectrogramRegressor (issue #19). Hyperparameters
# carried over from the Sound2Synth paper's own train.py/sound2synth.py defaults
# (github.com/Sound2Synth/Sound2Synth -- no separate published training config exists;
# these are the repo's argparse defaults) where models/training/ supports them; see
# docs/PAPER_CANDIDATES.md. Not supported by our harness and therefore dropped: LR
# warmup (plain cosine decay over the full run instead of the paper's 4-epoch linear
# warmup), gradient accumulation (unneeded -- batch_size 64 already matches the
# paper's effective batch size directly), and StochasticWeightAveraging.
#
# This is the fuller counterpart to smoke_config.yaml (2-epoch acceptance run); see
# cluster/README.md "The full run".
seed: 0

optimizer:
  name: adamw
  learning_rate: 2.0e-4     # Sound2Synth train.py default
  weight_decay: 1.0e-4      # Sound2Synth train.py default
  scheduler: cosine
  scheduler_max_epochs: 30  # matches trainer.max_epochs below

data:
  batch_size: 64            # matches the paper's effective batch (2 x grad_accum 32)
  num_workers: 8            # matches #SBATCH --cpus-per-task=8
  pin_memory: true
  persistent_workers: true
  val_fraction: 0.1         # seeded sample-level split from the 29,310-sample corpus

trainer:
  max_epochs: 30              # Sound2Synth train.py default (num_epochs)
  precision: bf16-mixed       # A100
  accelerator: gpu            # fail loud if no GPU is visible (we requested --gres=gpu:1)
  devices: 1
  strategy: auto
  gradient_clip_val: 1.0      # Sound2Synth train.py default
  early_stopping_patience: 8  # Sound2Synth train.py default (patience on val loss)
  log_every_n_steps: 50
  deterministic: false        # AdaptiveMaxPool2d has no deterministic CUDA backward;
                               # seed still fixes RNG (see smoke_config.yaml)

logger:
  wandb: true
